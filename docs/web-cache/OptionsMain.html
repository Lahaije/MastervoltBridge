<h1 id="Opt0">Options</h1>
<form name="OptionsFrm" method="post" enctype="multipart/form-data">
	<hr>
	<div class="meters">
			<div class="toggle_settings">
				<h2 id="Opt1">Shadow function</h2>
					<input type="checkbox" name="enShadow" id="enShadow" class="sub_field" ><label for="enShadow" class="radiolabel"></label>
			</div>
	</div>
	<hr>
	<div class="meters">
			<div class="toggle_settings">
				<h2 id="Opt2">Power limitation</h2>
				<input type="checkbox" name="enable_mxpower" id="enable_mxpower" class="sub_field" onClick="TogglePowerBox();"><label for="enable_mxpower" class="radiolabel"></label>
				<div class="collapse" id="maxpowdiv" style="display: none;">
					<span class="label"><label for="maxpower" id="Opt3">Power</label></span>
					<span class="value"><input type="text" name="maxpower" value="" id="maxpower" maxlength="4" onkeypress="return Chkpower(this,event,0)" onFocus="ClearOptErr();"></span>
					<span class="unit">W</span>
				</div>
			</div>
	</div>
	<hr>
	<input type="button" id="saveopt" value="Save" class="right default" onClick="ValidateOptions();">
	<span class="UpgradeErrormsg" id="OptionsErr"></span>
</form>
<span id="FunctionTest" style="display: none;">
<br class="break">
<h1 style="margin-top: 20px;" id="Opt4">Function test</h1>
<hr>
<div class="meters">
	<input type="button" name="FunctionStart" id="startfunction" value="Start" onClick="StartFunctionTest();">
	<div id="ft_loader" style="display: none;"><img class="ft_loader" src="ajax-loader-big.gif" alt=""></div>
	<table class="ft" id="FunctionTable" style="display: none;">
	<thead>
		<tr>
			<th></th>
			<th class="value" id="Opt5">Setting</th>
			<th class="value" id="Opt6">Result</th>
			<th></th>
			<th class="value" id="Opt7">Setting</th>
			<th class="value" id="Opt8">Result</th>
			<th></th>
			<th></th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td class="label" id="Opt9">U High</td>
			<td class="value" id="UHSet"></td>
			<td class="value" id="UHRes"></td>
			<td class="unit">V</td>
			<td class="value" id="UHTimeSet"></td>
			<td class="value" id="UHTimeRes"></td>
			<td class="unit">ms</td>
			<td class="result" id="UHResult"></td>
		</tr>
		<tr>
			<td class="label" id="Opt10">U Low</td>
			<td class="value" id="ULSet"></td>
			<td class="value" id="ULRes"></td>
			<td class="unit">V</td>
			<td class="value" id="ULTimeSet"></td>
			<td class="value" id="ULTimeRes"></td>
			<td class="unit">ms</td>
			<td class="result" id="ULResult"></td>
		</tr>
		<tr>
			<td class="label" id="Opt11">F High</td>
			<td class="value" id="FHSet"></td>
			<td class="value" id="FHRes"></td>
			<td class="unit">Hz</td>
			<td class="value" id="FHTimeSet"></td>
			<td class="value" id="FHTimeRes"></td>
			<td class="unit">ms</td>
			<td class="result" id="FHResult"></td>
		</tr>
		<tr>
			<td class="label" id="Opt12">F Low</td>
			<td class="value" id="FLSet"></td>
			<td class="value" id="FLRes"></td>
			<td class="unit">Hz</td>
			<td class="value" id="FLTimeSet"></td>
			<td class="value" id="FLTimeRes"></td>
			<td class="unit">ms</td>
			<td class="result" id="FLResult"></td>
		</tr>
	</tbody>
	</table>
</div>
<hr>
</span>
