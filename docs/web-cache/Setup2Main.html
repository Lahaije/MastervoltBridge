<h1 id="Stp2id0">Setup your Mastervolt inverter</h1>
<p id="Stp2id1">Choose your Wi-Fi network.</p>
<form method="post" name="NW" id="Network" enctype="multipart/form-data">
	<hr>
	<label for="wifinetwork" id="Stp2id2">Wi-Fi Network</label><select name="wifinetwork" id="wifinetwork" onChange="CheckManual(2);">
		<option value="selectnw" id="Stp2id3">Select your own wireless network:</option>
		<option value="manual" id="Stp2id4">Manual...</option>
	</select><input type="button" name="refresh_wifi" onClick="ScanSSID();" id="refresh_wifi" class="refresh_wifi loading"><br>
	<span class="manualNetworkSettings" id="ManualSSID" STYLE="display:none">
		<label for="SSID" id="Stp2id5">Network name <span class="sub">(SSID)</span></label><input type="text" name="SSID" id="SSID" onFocus="ClearNwerr();" maxlength = "32"><br>
	</span>
	<label for="wifipassword" id="Stp2id6">Password</label><input type="password" name="wifipassword" id="wifipassword" maxlength="64"><input type="text" name="wifipassword_text" maxlength="64" id="wifipassword_text" style="display: none;"><br>
	<input type="checkbox" name="show_chars" onClick="TogglePassword();" id="show_chars" class="sub_field"><label for="show_chars" class="radiolabel" id="Stp2id7">Show characters</label>
	<input type="hidden" name="PASSWORD" maxlength="64">
	<hr>
	<label for="StaticIp" id="Stp2id8">Get IP Address</label><select name="StaticIp" id="StaticIp" onChange="ToggleDHCP();">
		<option value="on" id="Stp2id9">Automatic</option>
		<option value="0" id="Stp2id10">Static IP Address</option>
	</select>
	<span class="static_ip_settings" id="DHCP" STYLE="display:none">
		<label for="ip1" id="Stp2id11">IP Address</label><input type="text" class="ipnum" name="IP1" id="ip1" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="IP2" id="ip2" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="IP3" id="ip3" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="IP4" id="ip4" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0" onBlur="ValidateWoPopup(this,0,255,'Nwerr');">

		<label for="subnet1" id="Stp2id12">Sub-Net Mask</label><input type="text" class="ipnum" name="SNMASK1" id="subnet1" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0" onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="SNMASK2" id="subnet2" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="SNMASK3" id="subnet3" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="SNMASK4" id="subnet4" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0" onBlur="ValidateWoPopup(this,0,255,'Nwerr');">

		<label for="gateway1" id="Stp2id13">Gateway</label><input type="text" class="ipnum" name="GW1" id="gateway1" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0" onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="GW2" id="gateway2" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="GW3" id="gateway3" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="GW4" id="gateway4" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0" onBlur="ValidateWoPopup(this,0,255,'Nwerr');">

		<label for="prim1" id="Stp2id14">Primary DNS</label><input type="text" class="ipnum" name="PD1" id="prim1" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="PD2" id="prim2" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="PD3" id="prim3" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="PD4" id="prim4" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">

		<label for="sec1" id="Stp2id15">Secondary DNS</label><input type="text" class="ipnum" name="SD1" id="sec1" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="SD2" id="sec2" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0" onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="SD3" id="sec3" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
		 . <input type="text" class="ipnum" name="SD4" id="sec4" maxlength = "3" onkeypress="return check(event)" onFocus="ClearNwerr();" placeholder="0"onBlur="ValidateWoPopup(this,0,255,'Nwerr');">
	</span>
	<hr>
	<p><span id="Stp2id16">That's all. When you click </span><strong id="Stp2id17">Save & Connect</strong> <span id="Stp2id18">you will leave these pages and the inverter will connect to the selected network.</span></p>
	<span><input type="button" name="SaveNWConnect" id="saveConnNw" value="Save &amp; Connect" class="default right" onClick="ValidateNetwork(2);"></span>
	<span><input type="button" name="SaveNW" value="Save" id="SaveNw" class="right" onClick="ValidateNetwork(1)" STYLE="display: none;"></span>
	<span><input type="button" value="Back" id="BackNw" class="" onClick="GetMainData(1);"></span>
	<span class="NwErrormsg" id="Nwerr"></span>
</form>
