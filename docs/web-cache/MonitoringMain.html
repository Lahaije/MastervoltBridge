<h1 id="Mntr0">Live Monitoring</h1>

<hr>
<div class="meters">
	<h2 id="Mntr1">Status</h2>
	<span class="label" id="Mntr2">Status</span>
	<span class="value" id="MonitorStat"></span>
	<br>
	<span class="label" id="Mntr3">Reclosure time</span>
	<span class="value" id="ReclosureStat"></span>
	<span class="unit">s</span>
</div>
<hr>
<div class="meters">
	<h2 id="Mntr4">Input</h2>
	<span class="label" id="Mntr5">Voltage</span>
	<span class="value" id="IpVoltageStat"></span>
	<span class="unit">V</span>
	<br>
	<span class="label" id="Mntr6">Current</span>
	<span class="value" id="IpCurrentStat"></span>
	<span class="unit">A</span>
</div>
<hr>
<div class="meters">
	<h2 id="Mntr7">Output</h2>
	<span class="label" id="Mntr8">Power</span>
	<span class="value" id="PowerStat"></span>
	<span class="unit">W</span>
	<br>
	<span class="label" id="Mntr9">Power (%)</span>
	<span class="value" id="PowerPerStat"></span>
	<span class="unit">%</span>

	<span class="label" id="Mntr10">Voltage</span>
	<span class="value" id="OpVoltageStat"></span>
	<span class="unit">V</span>
	<br>
	<span class="label" id="Mntr11">Current</span>
	<span class="value" id="OpCurrentStat"></span>
	<span class="unit">A</span>
	<br>
	<span class="label" id="Mntr12">Frequency</span>
	<span class="value" id="OpFreqStat"></span>
	<span class="unit">Hz</span>
</div>
<hr>
<div class="meters">
	<h2 id="Mntr13">Day</h2>
	<span class="label" id="Mntr14">Energy</span>
	<span class="value" id="DayEnergyStat"></span>
	<span class="unit">kWh</span>
	<br>
	<span class="label" id="Mntr15">Operation time</span>
	<span class="value" id="DayRunTimeStat"></span>
	<span class="unit">h</span>
</div>

<hr>
<div class="meters">
	<h2 id="Mntr16">Total</h2>
	<span class="label" id="Mntr17">Energy</span>
	<span class="value" id="TotEnergyStat"></span>
	<span class="unit">kWh</span>
	<br>
	<span class="label" id="Mntr18">Operation time</span>
	<span class="value" id="TotRunTimeStat"></span>
	<span class="unit">h</span>
</div>
<hr>
<div class="meters">
	<h2 id="Mntr19">Temperature</h2>
	<span class="label" id="Mntr20">Inverter</span>
	<span class="value" id="InvTempStat"></span>
	<span class="unit">&deg;C</span>
</div>
